<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Thermal Grid - Live Demo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: #00d2ff; margin: 0; }
        .stats-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: #1e1e1e; padding: 15px; border-radius: 8px; flex: 1; text-align: center; border: 1px solid #333; }
        .stat-value { font-size: 24px; font-weight: bold; color: #00d2ff; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .building { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        .room-status { font-size: 18px; margin-top: 10px; padding: 10px; border-radius: 4px; text-align: center; font-weight: bold; transition: background-color 0.5s; }
        
        /* Status Colors */
        .status-idle { background-color: #333; color: #aaa; }
        .status-precooling { background-color: #00509e; color: white; }
        .status-coasting { background-color: #007f00; color: white; }
        
        button { background: #00d2ff; color: #000; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 20px;}
        button:hover { background: #0099cc; }
    </style>
</head>
<body>

    <header>
        <h1>Thermal Grid Optimizer</h1>
        <h2 id="clock">08:00 AM</h2>
    </header>

    <div class="stats-container">
        <div class="stat-box">
            <div>External Temp</div>
            <div class="stat-value" id="temp">22°C</div>
        </div>
        <div class="stat-box">
            <div>Grid Demand</div>
            <div class="stat-value" id="demand">Low (Solar Surplus)</div>
        </div>
        <div class="stat-box">
            <div>Carbon Prevented</div>
            <div class="stat-value" id="carbon">0 kg</div>
        </div>
    </div>

    <div class="grid-container">
        <div class="building">
            <h3>Academic Block (West Facing)</h3>
            <div id="academic-status" class="room-status status-idle">HVAC Idle - Empty</div>
        </div>
        <div class="building">
            <h3>Hostel Wing 6</h3>
            <div id="hostel-status" class="room-status status-idle">HVAC Idle - Minimal Load</div>
        </div>
    </div>

    <button onclick="runDemo()">▶ Run 12-Hour Time-Lapse Simulation</button>

    <script>
        function runDemo() {
            let hour = 8;
            let carbon = 0;
            const clock = document.getElementById('clock');
            const temp = document.getElementById('temp');
            const demand = document.getElementById('demand');
            const academic = document.getElementById('academic-status');
            const hostel = document.getElementById('hostel-status');
            const carbonEl = document.getElementById('carbon');

            const interval = setInterval(() => {
                hour++;
                
                // Format Time
                let displayHour = hour > 12 ? hour - 12 : hour;
                let ampm = hour >= 12 ? 'PM' : 'AM';
                clock.innerText = `${displayHour < 10 ? '0'+displayHour : displayHour}:00 ${ampm}`;

                // Morning: Solar Surplus, Trigger Pre-Cooling
                if (hour >= 9 && hour <= 11) {
                    temp.innerText = (20 + hour) + "°C";
                    academic.className = "room-status status-precooling";
                    academic.innerText = "PRE-COOLING (Using Solar)";
                    hostel.className = "room-status status-precooling";
                    hostel.innerText = "PRE-COOLING (Using Solar)";
                    carbon += 15;
                }
                
                // Afternoon: Peak Heat, Trigger Coasting/Optimization
                if (hour >= 12 && hour <= 16) {
                    temp.innerText = (25 + hour) + "°C"; // gets hot
                    demand.innerText = "CRITICAL (Peaker Plants Risk)";
                    demand.style.color = "#ff4c4c";
                    
                    academic.className = "room-status status-coasting";
                    academic.innerText = "COASTING (Thermal Battery Active)";
                    
                    hostel.className = "room-status status-idle";
                    hostel.innerText = "HVAC OFF (Occupancy Low)";
                    
                    carbon += 45; // Massive carbon savings during peak hours
                }

                // Evening Reset
                if (hour >= 17) {
                    temp.innerText = "32°C";
                    demand.innerText = "Stabilizing";
                    demand.style.color = "#00d2ff";
                    hostel.className = "room-status status-coasting";
                    hostel.innerText = "COOLING (Occupancy High)";
                    academic.className = "room-status status-idle";
                    academic.innerText = "HVAC OFF (Building Closed)";
                    carbon += 10;
                }

                carbonEl.innerText = carbon + " kg";

                if (hour >= 19) clearInterval(interval);
            }, 1000); // 1 real second = 1 simulation hour
        }
    </script>
</body>
</html>
